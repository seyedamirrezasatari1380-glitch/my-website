<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اسلایدر دو تایی</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
    }

    .section {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
      padding: 50px;
      background-color: #fff;
    }

    /* ستون اسلایدر */
    .slider-container {
      width: 60%;
      max-width: 600px;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .slide {
      min-width: 50%;
      box-sizing: border-box;
    }

    .slide img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }

    /* دکمه های قبلی/بعدی */
    .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 5px;
      font-size: 18px;
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    /* ستون محتوا */
    .content {
      width: 35%;
      max-width: 350px;
    }

    .content h2 {
      margin-top: 0;
      color: #333;
    }

    .content p {
      color: #666;
      line-height: 1.6;
    }

    /* ریسپانسیو */
    @media (max-width: 900px) {
      .section {
        flex-direction: column;
        align-items: center;
      }
      .slider-container, .content {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <div class="section">
    <!-- اسلایدر -->
    <div class="slider-container">
      <div class="slides">
        <div class="slide">
          <img src="./assets/images/پشت زمینه هدر.png" alt="Slide 1">
        </div>
        <div class="slide">
          <img src="./assets/images/عکس حرم2.jpg" alt="Slide 2">
        </div>
        <div class="slide">
            <img src="./assets/images/عکس حرم2.jpg" alt="Slide 2">
          </div>
          <div class="slide">
            <img src="./assets/images/عکس حرم2.jpg" alt="Slide 2">
          </div>
      </div>
      <button class="prev">&#10094;</button>
      <button class="next">&#10095;</button>
    </div>

    <!-- بخش محتوا -->
    <div class="content">
      <h2>عنوان بخش محتوا</h2>
      <p>
        اینجا می‌توانید محتوای دلخواه خود را قرار دهید. این متن به عنوان نمونه قرار داده شده است تا نشان دهد بخش محتوا کنار اسلایدر چگونه نمایش داده می‌شود.
      </p>
    </div>
  </div>

  <script>
    const slides = document.querySelector('.slides');
    const slide = document.querySelectorAll('.slide');
    const prev = document.querySelector('.prev');
    const next = document.querySelector('.next');
    let index = 0;

    function showSlide(i) {
      if (i >= slide.length) index = 0;
      else if (i < 0) index = slide.length - 1;
      slides.style.transform = `translateX(-${index * 100}%)`;
    }

    prev.addEventListener('click', () => {
      index--;
      showSlide(index);
    });

    next.addEventListener('click', () => {
      index++;
      showSlide(index);
    });

    // اسلایدر خودکار هر 5 ثانیه
    setInterval(() => {
      index++;
      showSlide(index);
    }, 5000);
  </script>

</body>
</html>
